name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
    tags: ['*']
  pull_request:
    branches: [master, main]

env:
  DOTNET_VERSION: '9.0'
  SOLUTION_FILE: 'CollectorShopPoc2.sln'
  PROJECT_NAME: 'collectorshop-back'
  IMAGE_NAME: ghcr.io/maalsi-cube3/collectorshop-back

jobs:
  # ── Stage 1: Lint ──────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore ${{ env.SOLUTION_FILE }}
      - run: dotnet format ${{ env.SOLUTION_FILE }} --verify-no-changes --severity warn

  # ── Stage 2: Build ─────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore ${{ env.SOLUTION_FILE }}
      - run: dotnet build ${{ env.SOLUTION_FILE }} -c Release
      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: '**/bin/Release/'
          retention-days: 1

  # ── Stage 3: Test ──────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore ${{ env.SOLUTION_FILE }}
      - run: |
          dotnet test ${{ env.SOLUTION_FILE }} \
            --no-restore \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            --logger "trx;LogFileName=test-results.trx"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            **/*.trx
            coverage/**/coverage.cobertura.xml

  # ── Stage 4: Security ─────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore ${{ env.SOLUTION_FILE }}
      - name: Check for vulnerable packages
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerable.txt
          if grep -q "has the following vulnerable packages" vulnerable.txt; then
            echo "Vulnerable packages found!"
            cat vulnerable.txt
            exit 1
          fi

  # ── Stage 5: SonarCloud ───────────────────────────────────
  sonar:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner
      - run: dotnet restore ${{ env.SOLUTION_FILE }}
      - name: Run SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"${{ secrets.SONAR_PROJECT_KEY }}" \
            /o:"${{ secrets.SONAR_ORGANIZATION }}" \
            /d:sonar.token="${SONAR_TOKEN}" \
            /d:sonar.host.url="https://sonarcloud.io"
          dotnet build ${{ env.SOLUTION_FILE }} -c Release
          dotnet sonarscanner end /d:sonar.token="${SONAR_TOKEN}"

  # ── Stage 6: Docker Build & Push ───────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [lint, build, test, security]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Stage 7: Trivy Security Scan ───────────────────────────
  trivy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  # ── Stage 8: Deploy to Azure VM ────────────────────────────
  deploy-azure:
    runs-on: ubuntu-latest
    needs: [docker, trivy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment: production
    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo '${{ secrets.GHCR_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /opt/services/apps
            docker compose pull collectorshop-back
            docker compose up -d --no-deps collectorshop-back
            test "$(docker inspect -f '{{.State.Running}}' collectorshop-back)" = "true"
            docker image prune -f

  # ── Stage 9: Deploy to K8s ───────────────────────────────
  deploy-k8s:
    runs-on: self-hosted
    needs: [trivy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    continue-on-error: true
    environment: school
    env:
      KUBE_NAMESPACE: 'grpcube3'
      APP_NAME: 'collectorshop-back'
      KUBECONFIG: /tmp/kubeconfig
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 --decode > $KUBECONFIG
          chmod 600 $KUBECONFIG
        shell: bash

      - name: Create GHCR registry secret
        run: |
          kubectl create secret docker-registry ghcr-regcred \
            --docker-server="ghcr.io" \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GITHUB_TOKEN }}" \
            -n "${{ env.KUBE_NAMESPACE }}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to K8s
        run: |
          IMAGE_FULL="${{ env.IMAGE_NAME }}:${{ github.sha }}"
          kubectl -n "${{ env.KUBE_NAMESPACE }}" set image deployment/"${{ env.APP_NAME }}" "${{ env.APP_NAME }}"="$IMAGE_FULL"
          kubectl -n "${{ env.KUBE_NAMESPACE }}" rollout status deployment/"${{ env.APP_NAME }}" --timeout=300s

      - name: Verify deployment
        run: kubectl -n "${{ env.KUBE_NAMESPACE }}" get deployment,pods,svc -l app="${{ env.APP_NAME }}"
