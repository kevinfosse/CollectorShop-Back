# ============================================================================
# Pipeline CI/CD — CollectorShop Backend (ASP.NET Core 10.0)
# Stratégie : Fail Fast, Shift Left (DevSecOps)
#
# Flux : Build → Tests (Unit + Integration + Couverture) → Sécurité (SCA + SAST/SonarCloud)
#        → Docker → Trivy (Scan images) → Deploy (manuel)
#
# Chaque étape est bloquante : si elle échoue, le pipeline s'arrête.
# La sécurité est intégrée AVANT le build Docker (Shift Left).
# Le déploiement est manuel (Continuous Delivery, pas Continuous Deployment)
# car l'application gère des transactions financières.
# ============================================================================

name: CI/CD Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # ----------------------------------------------------------------------------
  # Build — compilation du projet .NET pour valider l'intégrité du code source.
  # Premier garde-fou : si le code ne compile pas, le pipeline s'arrête immédiatement.
  # ----------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore
      - run: dotnet build --no-restore

  # ----------------------------------------------------------------------------
  # Tests unitaires — vérifient la logique métier isolée (indicateur maintenabilité)
  # Déclenchés sur chaque push pour un feedback rapide aux développeurs.
  # La couverture de code est collectée par Coverlet et archivée comme artefact.
  # Le rapport Cobertura sera envoyé à SonarCloud pour le Quality Gate.
  # ----------------------------------------------------------------------------
  test-unit:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet test --filter "Category!=Integration" --collect:"XPlat Code Coverage" --results-directory ./coverage -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage

  # ----------------------------------------------------------------------------
  # Tests d'intégration — vérifient la communication API + BDD (indicateur fiabilité)
  # Uniquement sur PR et main pour éviter de ralentir les branches de travail.
  # Un vrai SQL Server est lancé via service container pour des tests réalistes.
  # ----------------------------------------------------------------------------
  test-integration:
    needs: build
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: YourStrong@Passw0rd
        ports:
          - 1433:1433
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet test --filter "Category=Integration"
        env:
          ConnectionStrings__DefaultConnection: "Server=localhost;Database=CollectorShopTest;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True"

  # ----------------------------------------------------------------------------
  # SCA (Software Composition Analysis) — détecte les dépendances NuGet vulnérables
  # (indicateur sécurité). Shift Left : vérifié avant tout merge.
  # ----------------------------------------------------------------------------
  security-sca:
    needs: build
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore
      - run: dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerability-report.txt
      - run: |
          if grep -q "has the following vulnerable packages" vulnerability-report.txt; then
            echo "::warning::Vulnerable NuGet packages detected — check vulnerability-report.txt"
          fi

  # ----------------------------------------------------------------------------
  # SonarCloud — SAST (Static Application Security Testing) + Quality Gate
  # (indicateurs maintenabilité + sécurité)
  # Analyse le code source pour détecter : bugs, vulnérabilités, code smells,
  # duplication et complexité cyclomatique. Reçoit le rapport de couverture
  # Coverlet pour calculer le % de couverture (objectif ≥ 70%).
  # Le Quality Gate valide que les seuils sont respectés.
  # ----------------------------------------------------------------------------
  sonarcloud:
    needs: test-unit
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # SonarCloud a besoin de l'historique complet
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Récupérer le rapport de couverture du job test-unit
      - uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: ./coverage

      # Trouver le fichier de couverture (Coverlet génère un GUID dans le chemin)
      - name: Localiser le rapport de couverture
        id: coverage
        run: |
          COVERAGE_FILE=$(find ./coverage -name "coverage.opencover.xml" | head -1)
          echo "path=$COVERAGE_FILE" >> $GITHUB_OUTPUT
          echo "Rapport de couverture trouvé : $COVERAGE_FILE"

      # Installer et exécuter le scanner SonarCloud pour .NET
      - name: Installer SonarScanner for .NET
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Analyse SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"kevinfosse_CollectorShop-Back" \
            /o:"kevinfosse" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.opencover.reportsPaths="${{ steps.coverage.outputs.path }}" \
            /d:sonar.exclusions="**/Migrations/**,**/obj/**,**/bin/**"

          dotnet build --no-restore

          dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

  # ----------------------------------------------------------------------------
  # Build et push des images Docker vers GitHub Container Registry
  # Deux images produites : backend API + service notifications.
  # Taguées avec :latest ET :sha pour la traçabilité et les rollbacks.
  # ----------------------------------------------------------------------------
  docker-build:
    needs: [test-unit, security-sca]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Image backend API
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/collectorshop-back:latest
            ghcr.io/${{ github.repository_owner }}/collectorshop-back:${{ github.sha }}

      # Image service notifications
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.notifications
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/collectorshop-notifications:latest
            ghcr.io/${{ github.repository_owner }}/collectorshop-notifications:${{ github.sha }}

  # ----------------------------------------------------------------------------
  # Scan de vulnérabilités des images Docker — Shift Left Security (indicateur sécurité)
  # Trivy analyse les images après build pour détecter les CVE dans les couches OS.
  # exit-code: 0 — warning seulement, documenté dans le plan de remédiation.
  # Les rapports sont archivés comme artefacts pour audit.
  # ----------------------------------------------------------------------------
  security-trivy:
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy scan — collectorshop-back
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/collectorshop-back:${{ github.sha }}
          format: table
          output: trivy-report-back.txt
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Trivy scan — collectorshop-notifications
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/collectorshop-notifications:${{ github.sha }}
          format: table
          output: trivy-report-notifications.txt
          severity: CRITICAL,HIGH
          exit-code: '0'

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            trivy-report-back.txt
            trivy-report-notifications.txt

  # ----------------------------------------------------------------------------
  # Déploiement Continuous Delivery — validation humaine avant production
  # Déclenché manuellement (workflow_dispatch) car l'application gère des transactions
  # financières : un humain valide chaque déploiement en production.
  # ----------------------------------------------------------------------------
  deploy:
    needs: security-trivy
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    env:
      KUBECONFIG: /tmp/kubeconfig
    steps:
      - uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 --decode > $KUBECONFIG
          chmod 600 $KUBECONFIG

      - name: Deploy backend
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          kubectl -n collectorshop set image deployment/collectorshop-back collectorshop-back="ghcr.io/${{ github.repository_owner }}/collectorshop-back:${SHORT_SHA}"
          kubectl -n collectorshop rollout status deployment/collectorshop-back --timeout=300s

      - name: Deploy notifications
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          kubectl -n collectorshop set image deployment/collectorshop-notifications collectorshop-notifications="ghcr.io/${{ github.repository_owner }}/collectorshop-notifications:${SHORT_SHA}"
          kubectl -n collectorshop rollout status deployment/collectorshop-notifications --timeout=300s

      - name: Verify deployment
        run: kubectl -n collectorshop get deployment,pods,svc